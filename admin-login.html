<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-purple">
    <section class="card card-purple compact">
      <h1 class="brand">StuBud</h1>
      <p class="subtitle">Admin Login</p>

      <form>
        <div class="form-group">
          <label for="admin-email">Admin Email</label>
          <input id="admin-email" type="email" placeholder="admin@stubud.com" />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" placeholder="Enter password" />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
