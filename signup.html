<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Sign Up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card compact">
      <h1 class="brand">StuBud</h1>

      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label for="email">NYU Email</label>
          <input id="email" type="email" placeholder="netid@nyu.edu" />
        </div>

        <div class="form-group">
          <label for="year">Year</label>
          <select id="year">
            <option>Freshman</option>
            <option>Sophomore</option>
            <option>Junior</option>
            <option>Senior</option>
            <option>Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" placeholder="Create password" />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Sign Up</button>
      </form>
    </section>
  </main>
</body>
</html>
