<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card compact">
      <h1 class="brand">StuBud</h1>

      <form>
        <div class="form-group">
          <label for="nyu-email">NYU Email</label>
          <input id="nyu-email" type="email" placeholder="netid@nyu.edu" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Login</button>
        <a class="btn btn-secondary btn-block" href="signup.html">Sign Up</a>
      </form>

      <div class="link-row">
        Don’t have an account? <a href="signup.html">Sign up here</a>
      </div>
    </section>
  </main>
</body>
</html
