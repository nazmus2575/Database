<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create New Group</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="sidebar">
          <h3>Dashboard</h3>
          <nav>
            <a href="dashboard.html">Home</a>
            <a href="groups.html">See Groups</a>
            <a href="students.html">See Students</a>
            <a href="student-profile.html">Profile</a>
          </nav>
        </aside>

        <section>
          <h1 class="page-title">Create New Group</h1>
          <form>
            <div class="form-grid">
              <div class="form-group"><label>Create Name</label><input type="text" placeholder="Algorithms Midterm Squad" /></div>
              <div class="form-group"><label>Create ID (Share as Invite)</label><input type="text" placeholder="GRP-2041" /></div>
              <div class="form-group"><label>Start Time</label><input type="time" /></div>
              <div class="form-group"><label>End Time</label><input type="time" /></div>
              <div class="form-group"><label>Date</label><input type="date" /></div>
              <div class="form-group"><label>Notes</label><input type="text" placeholder="Bring lecture notes" /></div>
              <div class="form-group"><label>Floor</label><input type="text" placeholder="4th Floor" /></div>
              <div class="form-group"><label>Capacity</label><input type="number" placeholder="6" /></div>
            </div>
            <div class="actions">
              <button class="btn btn-primary">Create</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
